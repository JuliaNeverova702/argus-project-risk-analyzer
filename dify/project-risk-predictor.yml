            \ риски проекта.\nОпредели, какие задачи находятся под риском.\n\nОтветь\
            \ в JSON:\n\n{\n \"project_risk\": number,\n \"issues\": [\n   {\n   \
            \  \"key\": \"...\",\n     \"risk\": number,\n     \"reason\": \"...\"\
            \n   }\n ]\n}"
